<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MLB Dashboard Colaborativo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .loading-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.7); z-index: 100; justify-content: center; align-items: center; }
    </style>
</head>
<body class="min-h-screen bg-slate-50">

    <div id="loading" class="loading-overlay"><i class="fas fa-spinner fa-spin fa-2x text-blue-600"></i></div>

    <header class="bg-white border-b border-slate-200 sticky top-0 z-40">
        <div class="max-w-7xl mx-auto px-4 h-20 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="bg-blue-600 p-2 rounded-lg text-white"><i class="fas fa-database"></i></div>
                <div>
                    <h1 class="text-xl font-bold">MLB Dash <span class="text-xs font-normal text-emerald-600 border border-emerald-200 bg-emerald-50 px-2 py-0.5 rounded-full ml-2">Online</span></h1>
                </div>
            </div>
            <div class="flex items-center gap-4">
                <button onclick="fetchData()" class="p-2 text-slate-500 hover:text-blue-600"><i class="fas fa-sync"></i> Atualizar</button>
                <button onclick="addRecord()" class="bg-blue-600 text-white px-4 py-2 rounded-xl font-bold active:scale-95 transition-all shadow-md hover:bg-blue-700">
                    <i class="fas fa-plus mr-2"></i> Novo Registro
                </button>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 py-8">
        <div class="bg-white border border-slate-200 rounded-2xl shadow-sm overflow-hidden">
            <table class="w-full text-left">
                <thead>
                    <tr class="bg-slate-50 border-b border-slate-200 text-[11px] font-bold text-slate-500 uppercase">
                        <th class="px-6 py-4">MLB</th>
                        <th class="px-6 py-4">Alteração</th>
                        <th class="px-6 py-4">Motivo</th>
                        <th class="px-6 py-4">Data</th>
                        <th class="px-6 py-4">Data Revisão</th>
                        <th class="px-6 py-4 text-center">Ações</th>
                    </tr>
                </thead>
                <tbody id="tableBody" class="divide-y divide-slate-100 text-sm"></tbody>
            </table>
        </div>
        <p class="text-center text-slate-400 text-xs mt-6 italic">As alterações são salvas automaticamente na nuvem.</p>
    </main>

    <script>
        // --- COLOQUE A URL DA SUA PLANILHA AQUI ABAIXO ---
        const API_URL = 'https://docs.google.com/spreadsheets/d/1rG0s0-Ij4b92_s8iOv0n2ztNaO7jN-JmplREQXzMUUI/edit?gid=0#gid=0'; 
        // ------------------------------------------------
        
        let data = [];

        async function fetchData() {
            document.getElementById('loading').style.display = 'flex';
            try {
                const response = await fetch(API_URL);
                data = await response.json();
                renderTable();
            } catch (e) { alert("Erro ao carregar dados!"); }
            document.getElementById('loading').style.display = 'none';
        }

async function fetchData() {
    document.getElementById('loading').style.display = 'flex';
    try {
        // Adicionamos um timestamp para evitar que o navegador use dados velhos (cache)
        const response = await fetch(API_URL + '?t=' + Date.now());
        if (!response.ok) throw new Error('Erro na rede');
        data = await response.json();
        renderTable();
    } catch (e) { 
        console.log(e);
        alert("Erro ao carregar dados! Verifique se a URL do App Script está correta e como 'Qualquer pessoa'."); 
    }
    document.getElementById('loading').style.display = 'none';
}

        function addRecord() {
            data.unshift({ id: Date.now(), mlb: '', alteration: '', reason: 'Outros', date: '', reviewDate: '' });
            renderTable();
        }

        function updateField(id, field, value) {
            const item = data.find(i => i.id == id);
            if(item) {
                item[field] = value;
                syncData(); // Salva na planilha automaticamente ao mudar
            }
        }

        function deleteRecord(id) {
            if(confirm('Excluir este registro?')) {
                data = data.filter(item => item.id != id);
                syncData();
            }
        }

        function renderTable() {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';
            data.forEach(item => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td class="px-4 py-2"><input onblur="updateField(${item.id}, 'mlb', this.value)" value="${item.mlb}" class="w-full p-2 bg-transparent focus:bg-white border-transparent focus:border-blue-200 border rounded font-mono"></td>
                    <td class="px-4 py-2"><input onblur="updateField(${item.id}, 'alteration', this.value)" value="${item.alteration}" class="w-full p-2 bg-transparent focus:bg-white border-transparent focus:border-blue-200 border rounded"></td>
                    <td class="px-4 py-2">
                        <select onchange="updateField(${item.id}, 'reason', this.value)" class="w-full p-2 bg-transparent border-transparent border rounded">
                            <option ${item.reason == 'Preço' ? 'selected' : ''}>Preço</option>
                            <option ${item.reason == 'Estoque' ? 'selected' : ''}>Estoque</option>
                            <option ${item.reason == 'Título' ? 'selected' : ''}>Título</option>
                            <option ${item.reason == 'Descrição' ? 'selected' : ''}>Descrição</option>
                            <option ${item.reason == 'Outros' ? 'selected' : ''}>Outros</option>
                        </select>
                    </td>
                    <td class="px-4 py-2"><input type="date" onchange="updateField(${item.id}, 'date', this.value)" value="${item.date}" class="w-full p-2 bg-transparent border-transparent border rounded"></td>
                    <td class="px-4 py-2"><input type="date" onchange="updateField(${item.id}, 'reviewDate', this.value)" value="${item.reviewDate}" class="w-full p-2 bg-transparent border-transparent border rounded"></td>
                    <td class="px-4 py-2 text-center text-slate-300 hover:text-red-500 cursor-pointer" onclick="deleteRecord(${item.id})"><i class="fas fa-trash"></i></td>
                `;
                tbody.appendChild(tr);
            });
        }

        fetchData(); // Carrega ao abrir
    </script>
</body>
</html>
